<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparar empresas — tesinversión.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf9f6;--cream2:#f4f3ef;--cream3:#ece9e0;
  --ink:#1a1a18;--ink2:#4a4a44;--ink3:#9a9a90;--ink4:#c8c8c0;
  --rule:rgba(26,26,24,0.09);--rule2:rgba(26,26,24,0.05);
  --green:#276749;--gbg:#f0f7f4;--gborder:rgba(39,103,73,0.18);
  --amber:#975a16;--abg:#fef9f0;
  --red:#742a2a;--rbg:#fdf5f5;
  --blue:#2c5282;--bbg:#f0f4f9;--bborder:rgba(44,82,130,0.15);
}
html{font-size:15.5px;scroll-behavior:smooth}
body{font-family:'DM Sans',-apple-system,sans-serif;background:var(--cream);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:200;height:50px;background:rgba(250,249,246,0.95);backdrop-filter:blur(20px);border-bottom:0.5px solid var(--rule);display:flex;align-items:center;padding:0 28px;gap:16px}
.brand{font-family:'Lora',serif;font-size:17px;color:var(--ink);text-decoration:none}
.brand em{font-style:italic;color:var(--ink3)}
.topbar-right{margin-left:auto;display:flex;gap:6px}
.btn-sm{font-family:'DM Sans',sans-serif;font-size:12px;padding:5px 13px;border-radius:6px;cursor:pointer;transition:all 0.12s}
.btn-ghost{background:none;border:0.5px solid var(--rule);color:var(--ink2)}
.btn-ghost:hover{background:var(--cream2)}
.btn-dark{background:var(--ink);border:none;color:var(--cream);font-weight:500}
.btn-dark:hover{opacity:0.84}

/* PAGE */
.page{max-width:1000px;margin:0 auto;padding:40px 28px 80px}

/* HEADER */
.comp-header{text-align:center;margin-bottom:40px}
.comp-eyebrow{font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}
.comp-headline{font-family:'Lora',serif;font-size:28px;font-weight:600;letter-spacing:-0.02em;color:var(--ink);margin-bottom:8px}
.comp-sub{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink2);line-height:1.55}

/* COMPANY SELECTOR ROW */
.selector-row{display:grid;gap:16px;margin-bottom:0;position:sticky;top:50px;z-index:100;background:rgba(250,249,246,0.96);backdrop-filter:blur(16px);padding:16px 0;border-bottom:0.5px solid var(--rule)}
.sel-cell{background:var(--cream);border:0.5px solid var(--rule);border-radius:12px;padding:16px;cursor:pointer;transition:all 0.15s;text-align:center;position:relative}
.sel-cell:hover{border-color:rgba(26,26,24,0.2)}
.sel-cell.selected{border-color:var(--ink);background:var(--cream2)}
.sel-cell.empty{border-style:dashed;opacity:0.6}
.sel-cell.empty:hover{opacity:1;border-color:rgba(26,26,24,0.3)}
.sel-logo{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:600;margin:0 auto 10px;border:0.5px solid var(--rule);letter-spacing:-0.02em}
.sel-name{font-family:'Lora',serif;font-size:14px;font-weight:600;color:var(--ink);margin-bottom:2px}
.sel-ticker{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3);letter-spacing:0.04em}
.sel-qs{display:inline-flex;align-items:center;gap:4px;background:var(--gbg);border:0.5px solid var(--gborder);border-radius:4px;padding:2px 8px;margin-top:6px;font-family:'DM Mono',monospace;font-size:13px;font-weight:500;color:var(--green)}
.sel-qs span{font-family:'DM Sans',sans-serif;font-size:9px;color:rgba(39,103,73,0.6);letter-spacing:0.04em}
.sel-remove{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:50%;background:var(--cream3);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--ink3);transition:all 0.12s}
.sel-remove:hover{background:var(--rbg);color:var(--red)}
.sel-add-icon{font-size:22px;color:var(--ink4);margin-bottom:8px}
.sel-add-text{font-family:'DM Sans',sans-serif;font-size:12px;color:var(--ink3)}

/* DROPDOWN PICKER */
.picker{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--cream);border:0.5px solid var(--rule);border-radius:12px;box-shadow:0 8px 32px rgba(26,26,24,0.12);z-index:500;overflow:hidden}
.picker-search{width:100%;border:none;border-bottom:0.5px solid var(--rule);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);background:none;outline:none}
.picker-search::placeholder{color:var(--ink3)}
.picker-list{max-height:220px;overflow-y:auto}
.picker-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;transition:background 0.1s}
.picker-item:hover{background:var(--cream2)}
.picker-logo{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:9px;flex-shrink:0;border:0.5px solid var(--rule)}
.picker-name{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink);flex:1}
.picker-ticker{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink3)}
.picker-qs{font-family:'DM Mono',monospace;font-size:11px;color:var(--green);font-weight:500}

/* COMPARISON TABLE */
.comp-table-wrap{margin-top:8px}
.comp-section{margin-bottom:0}
.comp-section-title{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.09em;text-transform:uppercase;color:var(--ink3);padding:14px 0 8px;border-bottom:0.5px solid var(--rule);margin-bottom:0;display:flex;align-items:center;gap:8px}
.comp-section-title::after{content:'';flex:1;height:0.5px;background:var(--rule)}
.comp-row{display:grid;align-items:stretch;border-bottom:0.5px solid var(--rule2);transition:background 0.1s}
.comp-row:hover{background:var(--cream2)}
.comp-row:last-child{border-bottom:none}
.comp-row-label{padding:13px 0;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink2);display:flex;align-items:center;gap:6px}
.comp-row-label .ftag{display:inline-flex;font-family:'DM Mono',monospace;font-size:9px;background:var(--cream2);border:0.5px solid var(--rule);border-radius:3px;padding:1px 4px;color:var(--ink3);cursor:help;margin-left:2px}
.comp-row-label .ftag:hover{background:var(--bbg);color:var(--blue)}
.comp-cell{padding:13px 12px;display:flex;align-items:center;justify-content:center;text-align:center;border-left:0.5px solid var(--rule2)}
.comp-val{font-family:'DM Mono',monospace;font-size:15px;color:var(--ink);display:block}
.comp-sub{font-family:'DM Sans',sans-serif;font-size:10px;color:var(--ink3);margin-top:2px;display:block}
/* Winner highlight */
.comp-cell.winner .comp-val{color:var(--green);font-weight:500}
.comp-cell.winner::after{content:'✓';font-family:'DM Sans',sans-serif;font-size:9px;color:var(--green);margin-left:4px;font-weight:600}
.comp-cell.worst .comp-val{color:var(--red)}
/* Signal pills */
.comp-sig{display:inline-flex;align-items:center;gap:4px;font-family:'DM Sans',sans-serif;font-size:10px;padding:2px 7px;border-radius:10px;margin:2px}
.sig-g{background:var(--gbg);color:var(--green)}
.sig-a{background:var(--abg);color:var(--amber)}
.sig-r{background:var(--rbg);color:var(--red)}
.sig-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}

/* SCORE ROW */
.score-visual{display:flex;align-items:center;gap:8px;justify-content:center}
.score-circle{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:14px;font-weight:500}
.sc-hi{background:var(--gbg);color:var(--green);border:1.5px solid var(--gborder)}
.sc-mid{background:var(--abg);color:var(--amber);border:1.5px solid rgba(151,90,22,0.2)}
.sc-lo{background:var(--rbg);color:var(--red);border:1.5px solid rgba(116,42,42,0.15)}

/* NO DATA */
.no-data{font-family:'DM Mono',monospace;font-size:13px;color:var(--ink4)}

/* ADD NOTICE */
.add-notice{text-align:center;padding:32px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--ink3)}
</style>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html" style="display:flex;align-items:center;gap:9px;text-decoration:none">
    <img src="logo.png" alt="tesinversión" style="width:28px;height:28px;border-radius:50%;flex-shrink:0">
    <div style="display:flex;flex-direction:column;gap:0">
      <span style="font-family:'Lora',serif;font-size:16px;color:var(--ink);line-height:1.1">tes<em style="font-style:italic;color:var(--ink3)">inversión</em></span>
      <span style="font-family:'DM Sans',sans-serif;font-size:9px;color:var(--ink3);letter-spacing:0.04em">by Arquitectura de la Inversión</span>
    </div>
  </a>
  <div style="font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink3);margin-left:8px">/ Comparador</div>
  <div class="topbar-right">
    <button class="btn-sm btn-ghost">Iniciar sesión</button>
    <button class="btn-sm btn-dark">Crear cuenta</button>
  </div>
</div>

<div class="page">

  <div class="comp-header">
    <div class="comp-eyebrow">Análisis comparativo</div>
    <h1 class="comp-headline">Compare Empresas</h1>
    <p class="comp-sub">Selecciona hasta 3 empresas. El ganador en cada métrica se marca con ✓. Las fórmulas de cada métrica son las propias de tesinversión.com.</p>
  </div>

  <!-- SELECTOR -->
  <div class="selector-row" id="selectorRow" style="grid-template-columns: 1fr 1fr 1fr">
    <!-- populated by JS -->
  </div>

  <!-- COMPARISON TABLE -->
  <div class="comp-table-wrap" id="compTable">
    <div class="add-notice">Selecciona al menos una empresa para comenzar la comparación.</div>
  </div>

</div>

<script src="companies.js"></script>
<script>
// ── DATA — loaded from companies.js ──────────────────────────
// COMPANIES array comes from companies.js (loaded before this script)
// We convert it to the format expected by this comparador

function buildCompData() {
  const result = {};
  (typeof COMPANIES !== 'undefined' ? COMPANIES : []).forEach(co => {
    result[co.ticker] = {
      id: co.ticker,
      name: co.name,
      ticker: co.ticker,
      exchange: co.exchange,
      sector: co.sector,
      logo: co.logo,
      qs: co.qs,
      data: buildMockData(co)
    };
  });
  return result;
}

function buildMockData(co) {
  // Extract numeric values from metrics strings where possible
  const m = co.metrics || [];
  const parseNum = str => { const n = parseFloat((str||'').replace(/[^0-9.]/g,'')); return isNaN(n)?null:n; };
  const v = co.valuation || {};
  const basePrice = parseNum(v.base?.price);
  const curPrice = basePrice ? basePrice * 0.9 : null; // approximate
  const ms = parseNum(v.marginBase);
  return {
    per:{val:co.data?.per?.val||'—',num:co.data?.per?.num||null,sub:''},
    evEbitda:{val:co.data?.evEbitda?.val||'—',num:co.data?.evEbitda?.num||null,sub:''},
    evEbit:{val:co.data?.evEbit?.val||'—',num:co.data?.evEbit?.num||null,sub:''},
    evFcf:{val:co.data?.evFcf?.val||'—',num:co.data?.evFcf?.num||null,sub:''},
    ps:{val:co.data?.ps?.val||'—',num:co.data?.ps?.num||null,sub:''},
    pbv:{val:co.data?.pbv?.val||'—',num:co.data?.pbv?.num||null,sub:''},
    msBase:{val:v.marginBase||'—',num:ms,sub:`Precio base ${v.base?.price||'—'}`},
    price15:{val:v.price15||'—',num:parseNum(v.price15),sub:'Para retorno ≥15%/año'},
    roic:{val:co.data?.roic?.val||m.find(x=>x.includes('ROIC'))||'—',num:co.data?.roic?.num||null,sub:''},
    roicIncr:{val:co.data?.roicIncr?.val||'—',num:co.data?.roicIncr?.num||null,sub:''},
    roe:{val:co.data?.roe?.val||'—',num:co.data?.roe?.num||null,sub:''},
    roa:{val:co.data?.roa?.val||'—',num:co.data?.roa?.num||null,sub:''},
    grossM:{val:co.data?.grossM?.val||'—',num:co.data?.grossM?.num||null,sub:''},
    ebitM:{val:co.data?.ebitM?.val||m.find(x=>x.includes('EBIT'))||'—',num:co.data?.ebitM?.num||null,sub:''},
    netM:{val:co.data?.netM?.val||'—',num:co.data?.netM?.num||null,sub:''},
    fcfM:{val:co.data?.fcfM?.val||'—',num:co.data?.fcfM?.num||null,sub:''},
    fcfConv:{val:co.data?.fcfConv?.val||'—',num:co.data?.fcfConv?.num||null,sub:''},
    fcfPs:{val:co.data?.fcfPs?.val||'—',num:co.data?.fcfPs?.num||null,sub:'FCF/acción diluida'},
    fcfYield:{val:co.data?.fcfYield?.val||'—',num:co.data?.fcfYield?.num||null,sub:'FCF/acción ÷ precio'},
    payoutDiv:{val:co.data?.payoutDiv?.val||'—',num:co.data?.payoutDiv?.num||null,sub:''},
    payoutTotal:{val:co.data?.payoutTotal?.val||'—',num:co.data?.payoutTotal?.num||null,sub:''},
    debtEbitda:{val:co.data?.debtEbitda?.val||'—',num:co.data?.debtEbitda?.num||null,sub:''},
    icr:{val:co.data?.icr?.val||'—',num:co.data?.icr?.num||null,sub:''},
    netPos:{val:co.data?.netPos?.val||'—',num:co.data?.netPos?.num||null,sub:''},
    revCagr:{val:co.data?.revCagr?.val||'—',num:co.data?.revCagr?.num||null,sub:'CAGR 3 años'},
    epsCagr:{val:co.data?.epsCagr?.val||'—',num:co.data?.epsCagr?.num||null,sub:'CAGR 3 años'},
    fcfCagr:{val:co.data?.fcfCagr?.val||'—',num:co.data?.fcfCagr?.num||null,sub:'CAGR 3 años'},
    signals:co.heroSignals||co.signals||[],
  };
}

// ── STATE ─────────────────────────────────────────────────
let COMPANIES_MAP = {};
let selected = ['RACE', 'MSFT', null];
let openPicker = null;

// ── METRIC DEFINITIONS ────────────────────────────────────
const METRICS = [
  {section:'Índice de Calidad'},
  {key:'qs', label:'Índice de Calidad', formula:'10 criterios × 10 pts', higherBetter:true, isScore:true},
  {section:'Valoración'},
  {key:'per', label:'PER', formula:'Market Cap / Net Income', higherBetter:false},
  {key:'evEbitda', label:'EV / EBITDA', formula:'EV / EBITDA', higherBetter:false},
  {key:'evEbit', label:'EV / EBIT', formula:'EV / EBIT', higherBetter:false},
  {key:'evFcf', label:'EV / FCF', formula:'EV / FCF', higherBetter:false},
  {key:'ps', label:'P / Ventas', formula:'Market Cap / Revenue', higherBetter:false},
  {key:'pbv', label:'Price / Book', formula:'Market Cap / Equity', higherBetter:false},
  {key:'msBase', label:'Margen de seguridad', formula:'(Valor intrínseco − Precio) / Precio', higherBetter:true},
  {key:'price15', label:'Precio para retorno ≥15%/año', formula:'Precio con retorno anualizado ≥15% en escenario base', higherBetter:false, noWinner:true},
  {section:'Rentabilidad'},
  {key:'roic', label:'ROIC', formula:'EBIT × (1−T) / Capital Invertido × 100', higherBetter:true},
  {key:'roicIncr', label:'ROIC Incremental', formula:'Δ NOPAT / Δ Capital Invertido × 100', higherBetter:true},
  {key:'roe', label:'ROE', formula:'Net Income / Equity × 100', higherBetter:true},
  {key:'roa', label:'ROA', formula:'Net Income / Total Assets × 100', higherBetter:true},
  {section:'Márgenes'},
  {key:'grossM', label:'Margen bruto', formula:'Gross Profit / Revenue × 100', higherBetter:true},
  {key:'ebitM', label:'Margen EBIT', formula:'EBIT / Revenue × 100', higherBetter:true},
  {key:'netM', label:'Margen neto', formula:'Net Income / Revenue × 100', higherBetter:true},
  {key:'fcfM', label:'Margen FCF', formula:'FCF / Revenue × 100', higherBetter:true},
  {key:'fcfConv', label:'FCF Conversion', formula:'FCF / Net Income × 100', higherBetter:true},
  {section:'FCF y dividendos'},
  {key:'fcfPs', label:'FCF por acción', formula:'FCF / Acciones diluidas', higherBetter:true},
  {key:'fcfYield', label:'FCF Yield', formula:'FCF / acción ÷ precio × 100', higherBetter:true},
  {key:'fcfPs', label:'FCF por acción', formula:'FCF / Acciones diluidas', higherBetter:true},
  {key:'payoutDiv', label:'Payout dividendos', formula:'Dividendos / Net Income × 100', higherBetter:false, noWinner:true},
  {key:'payoutTotal', label:'Payout total', formula:'(Dividendos + Recompras) / FCF × 100', higherBetter:false, noWinner:true},
  {section:'Salud financiera'},
  {key:'debtEbitda', label:'Deuda neta / EBITDA', formula:'Posición financiera neta / EBITDA', higherBetter:false},
  {key:'icr', label:'Cobertura intereses (ICR)', formula:'EBIT / Interest Expense', higherBetter:true},
  {section:'Crecimiento'},
  {key:'revCagr', label:'Revenue CAGR 3A', formula:'(Rev. actual / Rev. 3 años antes)^(1/3) − 1', higherBetter:true},
  {key:'epsCagr', label:'EPS CAGR 3A', formula:'(EPS actual / EPS 3 años antes)^(1/3) − 1', higherBetter:true},
  {key:'fcfCagr', label:'FCF CAGR 3A', formula:'(FCF actual / FCF 3 años antes)^(1/3) − 1', higherBetter:true},
  {section:'Señales'},
  {key:'signals', label:'Señales clave', isSignals:true},
];

// ── RENDER ────────────────────────────────────────────────
function render(){
  renderSelector();
  renderTable();
}

function renderSelector(){
  const row = document.getElementById('selectorRow');
  const cols = 3;
  row.style.gridTemplateColumns = Array(cols).fill('1fr').join(' ');
  row.innerHTML = '';
  for(let i=0;i<cols;i++){
    const id = selected[i]; // id is ticker string
    const div = document.createElement('div');
    div.className = 'sel-cell ' + (id ? 'selected' : 'empty');
    if(id && COMPANIES_MAP[id]){
      const c = COMPANIES_MAP[id];
      div.innerHTML = `
        <div class="sel-logo" style="background:#fff;border:0.5px solid rgba(0,0,0,0.08);overflow:hidden;display:flex;align-items:center;justify-content:center"><img src="${c.logo?.file||''}" style="width:36px;height:36px;object-fit:contain" onerror="this.parentElement.innerHTML='<span style=\'font-size:11px;font-weight:600;color:#4a4a44\'>${c.ticker}</span>'"></div>
        <div class="sel-name">${c.name}</div>
        <div class="sel-ticker">${c.exchange}: ${c.ticker}</div>
        <div class="sel-qs">${c.qs}<span>/100</span></div>
        <button class="sel-remove" onclick="removeCompany(${i},event)">✕</button>`;
    } else {
      div.innerHTML = `<div class="sel-add-icon">+</div><div class="sel-add-text">Añadir empresa</div>`;
      div.onclick = () => togglePicker(i, div);
    }
    row.appendChild(div);
  }
}

function renderTable(){
  const table = document.getElementById('compTable');
  const activeIds = selected.filter(id => id && COMPANIES_MAP[id]);
  if(!activeIds.length){ table.innerHTML = '<div class="add-notice">Selecciona al menos una empresa para comenzar.</div>'; return; }

  const cols = activeIds.length;
  const gridCols = `220px ${'1fr '.repeat(cols)}`;

  let html = '';

  METRICS.forEach(m => {
    if(m.section){
      html += `<div class="comp-section-title">${m.section}</div>`;
      return;
    }

    // Get values
    const vals = activeIds.map(id => {
      if(m.isScore) return {val:COMPANIES_MAP[id].qs,num:COMPANIES_MAP[id].qs,sub:''};
      return (COMPANIES_MAP[id]?.data||{})[m.key] || {val:'—',num:null,sub:''};
    });

    // Find best
    let bestIdx = -1;
    let worstIdx = -1;
    if(!m.noWinner && !m.isSignals){
      const nums = vals.map(v => v.num !== null && v.num !== undefined ? v.num : null);
      const valid = nums.filter(n => n !== null);
      if(valid.length > 1){
        const best = m.higherBetter ? Math.max(...valid) : Math.min(...valid);
        const worst = m.higherBetter ? Math.min(...valid) : Math.max(...valid);
        bestIdx = nums.indexOf(best);
        worstIdx = nums.indexOf(worst);
      }
    }

    html += `<div class="comp-row" style="display:grid;grid-template-columns:${gridCols}">`;
    html += `<div class="comp-row-label">${m.label}${m.formula ? `<span class="ftag" title="${m.formula}">f</span>` : ''}</div>`;

    activeIds.forEach((id, i) => {
      if(m.isSignals){
        const sigs = (COMPANIES_MAP[id]?.data||{}).signals || [];
        html += `<div class="comp-cell" style="flex-direction:column;gap:2px;padding:10px 8px">`;
        sigs.forEach(s => {
          html += `<span class="comp-sig sig-${s.type}"><span class="sig-dot" style="background:${s.type==='g'?'var(--green)':s.type==='a'?'var(--amber)':'var(--red)'}"></span>${s.label}</span>`;
        });
        html += `</div>`;
      } else if(m.isScore){
        const qs = COMPANIES_MAP[id].qs;
        const cls = qs>=85?'sc-hi':qs>=70?'sc-mid':'sc-lo';
        html += `<div class="comp-cell"><div class="score-visual"><div class="score-circle ${cls}">${qs}</div></div></div>`;
      } else {
        const v = vals[i];
        const cellCls = i===bestIdx?'winner':i===worstIdx?'worst':'';
        html += `<div class="comp-cell ${cellCls}">
          <div>
            <span class="comp-val">${v.val||'—'}</span>
            ${v.sub?`<span class="comp-sub">${v.sub}</span>`:''}
          </div>
        </div>`;
      }
    });

    // Empty cells if less than max companies
    for(let i=activeIds.length; i<3; i++){
      html += `<div class="comp-cell"><span class="no-data">—</span></div>`;
    }

    html += `</div>`;
  });

  table.innerHTML = html;
}

// ── PICKER ────────────────────────────────────────────────
function togglePicker(slotIdx, btn){
  // Close any open picker
  document.querySelectorAll('.picker').forEach(p=>p.remove());
  if(openPicker === slotIdx){ openPicker = null; return; }
  openPicker = slotIdx;

  const picker = document.createElement('div');
  picker.className = 'picker';

  const available = Object.values(COMPANIES_MAP).filter(c => !selected.includes(c.ticker) || selected[slotIdx]===c.ticker);

  picker.innerHTML = `<input class="picker-search" placeholder="Buscar empresa..." oninput="filterPicker(this)" autofocus>
    <div class="picker-list" id="pickerList">
      ${available.map(c=>`
        <div class="picker-item" onclick="selectCompany(${slotIdx},'${c.ticker}')">
          <div class="picker-logo" style="background:#fff;border:0.5px solid rgba(0,0,0,0.08);border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center;width:28px;height:28px"><img src="${c.logo?.file||''}" style="width:22px;height:22px;object-fit:contain" onerror="this.parentElement.innerHTML='<span style=\'font-family:monospace;font-size:9px;font-weight:600;color:#4a4a44\'>${c.ticker}</span>'"></div>
          <span class="picker-name">${c.name}</span>
          <span class="picker-ticker">${c.ticker}</span>
          <span class="picker-qs">${c.qs||'—'}</span>
        </div>`).join('')}
    </div>`;

  btn.style.position='relative';
  btn.appendChild(picker);

  // Close on outside click
  setTimeout(()=>{
    document.addEventListener('click', function handler(e){
      if(!picker.contains(e.target)&&e.target!==btn){
        picker.remove(); openPicker=null;
        document.removeEventListener('click',handler);
      }
    });
  },10);
}

function filterPicker(input){
  const q = input.value.toLowerCase();
  document.querySelectorAll('.picker-item').forEach(item=>{
    item.style.display = item.textContent.toLowerCase().includes(q)?'':'none';
  });
}

function selectCompany(slot, id){
  selected[slot] = id.toUpperCase();
  openPicker = null;
  document.querySelectorAll('.picker').forEach(p=>p.remove());
  render();
}

function removeCompany(slot, e){
  e.stopPropagation();
  selected[slot] = null;
  render();
}

// ── INIT ─────────────────────────────────────────────────
setTimeout(function() {
  if(typeof COMPANIES !== 'undefined') {
    COMPANIES_MAP = buildCompData();
  }
  render();
}, 20);
</script>
